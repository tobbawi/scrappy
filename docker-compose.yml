services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      # Use host Ollama (Metal GPU acceleration on Apple Silicon)
      OLLAMA_HOST: http://host.docker.internal:11434
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    deploy:
      resources:
        limits:
          memory: 2g

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128m
